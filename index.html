<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Kick</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#scoreboard {
    text-align: center; padding: 12px 0 0;
    font-size: 56px; font-weight: 700; letter-spacing: 4px;
    color: #fff; text-shadow: 2px 3px 8px rgba(0,0,0,0.35);
}
#score-label {
    text-align: center;
    font-size: 13px; letter-spacing: 3px; color: rgba(255,255,255,0.45);
    margin-top: 2px;
}
#scoreboard .blue { color: #74b9ff; }
#scoreboard .red { color: #ff6b6b; }
#boost-wrap {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    width: 220px;
}
#boost-label { color: rgba(255,255,255,0.55); font-size: 11px; text-align: center; margin-bottom: 4px; letter-spacing: 2px; }
#boost-track {
    width: 100%; height: 16px; background: rgba(0,0,0,0.35);
    border-radius: 8px; overflow: hidden;
}
#boost-fill {
    width: 100%; height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, #74b9ff, #0984e3);
    transition: width 0.08s linear;
}
#hint {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font-size: 13px; white-space: nowrap;
}
#goal-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 80px; font-weight: 900; color: #fff;
    text-shadow: 0 0 30px rgba(255,200,50,0.8), 3px 4px 8px rgba(0,0,0,0.4);
    display: none; letter-spacing: 6px;
}
#ball-arrow {
    display: none;
    position: absolute;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid #ffeaa7;
    pointer-events: none;
    z-index: 20;
    transform-origin: center center;
}

/* ===== TOUCH CONTROLS ===== */
#touch-controls {
    display: none;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
}
#touch-controls.active { display: block; }

/* Virtual joystick */
#joystick-zone {
    position: absolute; left: 0; top: 0;
    width: 50%; height: 100%;
    pointer-events: auto;
    touch-action: none;
}
#joystick-base {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    display: none;
    pointer-events: none;
    z-index: 11;
}
#joystick-knob {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.5);
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

/* Action buttons (right side) */
.touch-btn {
    position: absolute; pointer-events: auto;
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
}
.touch-btn.pressed { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); }
.action-btns {
    position: absolute; right: 16px; bottom: 36px;
    width: 100px; height: 180px;
}
.action-btns .touch-btn { position: absolute; }
.action-btns #btn-jump  { right: 0; bottom: 96px; width: 88px; height: 80px; border-radius: 18px; font-size: 15px; }
.action-btns #btn-boost { right: 0; bottom: 0;   width: 72px; height: 72px; border-radius: 50%; font-size: 12px; }
</style>
</head>
<body>
<div id="hud">
    <div id="scoreboard">
        <span class="blue" id="p-score">0</span>
        <span>&nbsp;&ndash;&nbsp;</span>
        <span class="red" id="a-score">0</span>
    </div>
    <div id="score-label">SCORE IN RED</div>
    <div id="hint">WASD Drive &nbsp;|&nbsp; SPACE Jump / Flip &nbsp;|&nbsp; SHIFT Boost</div>
    <div id="boost-wrap">
        <div id="boost-label">BOOST</div>
        <div id="boost-track"><div id="boost-fill"></div></div>
    </div>
    <div id="goal-overlay">GOAL!</div>
    <div id="ball-arrow"></div>

    <div id="touch-controls">
        <div id="joystick-zone"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div class="action-btns">
            <div class="touch-btn" id="btn-jump">JUMP</div>
            <div class="touch-btn" id="btn-boost">BOOST</div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
}
</script>
<script type="module">
    import { initGame, gameLoop } from './js/game.js';
    initGame();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
