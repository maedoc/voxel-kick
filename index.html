<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Kick</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#scoreboard {
    text-align: center; padding: 18px 0 0;
    font-size: 56px; font-weight: 700; letter-spacing: 4px;
    color: #fff; text-shadow: 2px 3px 8px rgba(0,0,0,0.35);
}
#scoreboard .blue { color: #74b9ff; }
#scoreboard .red { color: #ff6b6b; }
#boost-wrap {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    width: 220px;
}
#boost-label { color: rgba(255,255,255,0.55); font-size: 11px; text-align: center; margin-bottom: 4px; letter-spacing: 2px; }
#boost-track {
    width: 100%; height: 16px; background: rgba(0,0,0,0.35);
    border-radius: 8px; overflow: hidden;
}
#boost-fill {
    width: 100%; height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, #74b9ff, #0984e3);
    transition: width 0.08s linear;
}
#hint {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font-size: 13px; white-space: nowrap;
}
#goal-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 80px; font-weight: 900; color: #fff;
    text-shadow: 0 0 30px rgba(255,200,50,0.8), 3px 4px 8px rgba(0,0,0,0.4);
    display: none; letter-spacing: 6px;
}

/* ===== TOUCH CONTROLS ===== */
#touch-controls {
    display: none;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
}
#touch-controls.active { display: block; }

/* Virtual joystick */
#joystick-zone {
    position: absolute; left: 0; top: 0;
    width: 50%; height: 100%;
    pointer-events: auto;
    touch-action: none;
}
#joystick-base {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    display: none;
    pointer-events: none;
    z-index: 11;
}
#joystick-knob {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.5);
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

/* Action buttons (right side) */
.touch-btn {
    position: absolute; pointer-events: auto;
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
}
.touch-btn.pressed { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); }
.action-btns {
    position: absolute; right: 16px; bottom: 36px;
    width: 100px; height: 180px;
}
.action-btns .touch-btn { position: absolute; }
.action-btns #btn-jump  { right: 0; bottom: 96px; width: 88px; height: 80px; border-radius: 18px; font-size: 15px; }
.action-btns #btn-boost { right: 0; bottom: 0;   width: 72px; height: 72px; border-radius: 50%; font-size: 12px; }
</style>
</head>
<body>
<div id="hud">
    <div id="scoreboard">
        <span class="blue" id="p-score">0</span>
        <span>&nbsp;&ndash;&nbsp;</span>
        <span class="red" id="a-score">0</span>
    </div>
    <div id="hint">WASD Drive &nbsp;|&nbsp; SPACE Jump / Flip &nbsp;|&nbsp; SHIFT Boost</div>
    <div id="boost-wrap">
        <div id="boost-label">BOOST</div>
        <div id="boost-track"><div id="boost-fill"></div></div>
    </div>
    <div id="goal-overlay">GOAL!</div>

    <div id="touch-controls">
        <div id="joystick-zone"></div>
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <div class="action-btns">
            <div class="touch-btn" id="btn-jump">JUMP</div>
            <div class="touch-btn" id="btn-boost">BOOST</div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ===== CONSTANTS ===== */
const V      = 0.3;          // voxel size
const AW     = 108;          // arena width  (X)  — 72×1.5
const AL     = 165;          // arena length (Z)  — 110×1.5
const AH     = 45;           // arena height (Y)  — 30×1.5
const GW     = 27;           // goal width        — 18×1.5
const GH     = 18;           // goal height       — 12×1.5
const GD     = 12;           // goal depth        — 8×1.5
const BR     = 2.25;         // ball radius
const CHX    = 1.05;         // car half-extents
const CHY    = 0.65;
const CHZ    = 2.05;
const GRAV   = -14.0;
const C_ACC  = 56;           // car acceleration
const C_MAX  = 250;          // car max speed
const C_TURN = 3.4;          // car turn speed (rad/s)
const C_GFRI = 0.945;        // car ground friction
const C_AFRI = 0.985;        // car air friction
const J_VEL  = 14;           // jump velocity (reduced to ~60% of old 18)
const J_CUT  = 0.55;         // variable jump: velocity kept on quick release
const ACCEL_RAMP_T = 0.4;    // seconds to reach full acceleration
const F_VEL  = 23;           // flip impulse
const F_DUR  = 0.28;         // flip anim duration
const B_ACC  = 78;           // boost acceleration
const B_MAX  = 400;
const B_DRAIN= 0.65;
const B_REGEN= 0.12;
const B_REST = 0.82;         // ball restitution
const W_REST = 0.85;          // wall restitution
const BG_FRI = 0.978;        // ball ground friction
const BA_FRI = 0.997;        // ball air friction
const F_MULT = 1.8;          // flip hit multiplier
const C_MASS = 5;
const BL_MASS= 1;
const GOAL_CD= 2.0;          // goal cooldown seconds

/* ===== THREE SETUP ===== */
const scene    = new THREE.Scene();
// Sky gradient background
(function(){
    const c = document.createElement('canvas'); c.width=2; c.height=512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,0,512);
    g.addColorStop(0,   '#1a3a5c');  // deep sky top
    g.addColorStop(0.3, '#4a90d9');  // mid blue
    g.addColorStop(0.55,'#87CEEB');  // light sky
    g.addColorStop(0.75,'#b8e4f0');  // pale horizon
    g.addColorStop(1,   '#e8f4e8');  // ground haze
    ctx.fillStyle = g; ctx.fillRect(0,0,2,512);
    const tex = new THREE.CanvasTexture(c);
    tex.mapping = THREE.EquirectangularReflectionMapping;
    scene.background = tex;
})();
const FOG_COLOR = 0x9dd4e8;
scene.fog      = new THREE.FogExp2(FOG_COLOR, 0.0018);

const camera   = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.1, 350);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(20, 50, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.left = -110; sc.right = 110; sc.top = 110; sc.bottom = -110; sc.near = 1; sc.far = 180;
scene.add(sun);

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

/* ===== VOXEL HELPERS ===== */
function makeVoxelMesh(voxels) {
    const s = V * 0.92;
    const geo = new THREE.BoxGeometry(s, s, s);
    const mat = new THREE.MeshLambertMaterial();
    const mesh = new THREE.InstancedMesh(geo, mat, voxels.length);
    mesh.castShadow = true;
    const d = new THREE.Object3D(), c = new THREE.Color();
    for (let i = 0; i < voxels.length; i++) {
        const vx = voxels[i];
        d.position.set(vx.x, vx.y, vx.z);
        d.updateMatrix();
        mesh.setMatrixAt(i, d.matrix);
        c.setRGB(vx.r, vx.g, vx.b);
        mesh.setColorAt(i, c);
    }
    mesh.instanceMatrix.needsUpdate = true;
    if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
    return mesh;
}

function addBox(x1,y1,z1,x2,y2,z2,col,arr){
    for(let x=x1;x<x2;x+=V) for(let y=y1;y<y2;y+=V) for(let z=z1;z<z2;z+=V)
        arr.push({x,y,z,...col});
}

/* ===== CAR MODEL ===== */
function buildCar(bc, ac){
    const v=[];
    const wc={r:.18,g:.18,b:.18};
    // body
    addBox(-1, .3, -1.8, 1, .85, 1.8, bc, v);
    // hood
    addBox(-.85, .85, .6, .85, 1.05, 1.75, bc, v);
    // cabin
    addBox(-.7, .85, -.5, .7, 1.35, .65, ac, v);
    // rear spoiler
    addBox(-.9, 1.0, -1.65, .9, 1.08, -1.5, ac, v);
    // wheels
    addBox(-1.2, .0, 1.05, -.85, .42, 1.7, wc, v);
    addBox( .85, .0, 1.05, 1.2, .42, 1.7, wc, v);
    addBox(-1.2, .0,-1.7, -.85, .42,-1.05, wc, v);
    addBox( .85, .0,-1.7, 1.2, .42,-1.05, wc, v);
    // headlights
    const hl={r:1,g:1,b:.85};
    addBox(-.75,.5,1.75,-.45,.7,1.85,hl,v);
    addBox( .45,.5,1.75, .75,.7,1.85,hl,v);
    // taillights
    const tl={r:1,g:.25,b:.25};
    addBox(-.75,.5,-1.85,-.45,.7,-1.75,tl,v);
    addBox( .45,.5,-1.85, .75,.7,-1.75,tl,v);
    return v;
}

/* ===== BALL MODEL ===== */
function buildBall(){
    const v=[];
    const r=BR;
    for(let x=-r;x<=r;x+=V) for(let y=-r;y<=r;y+=V) for(let z=-r;z<=r;z+=V){
        if(x*x+y*y+z*z<=r*r){
            const ck=(Math.round(x/V)+Math.round(y/V)+Math.round(z/V))&1;
            v.push({x,y,z, r:1, g:ck?.92:.82, b:ck?.55:.35});
        }
    }
    return v;
}

/* ===== ARENA ===== */
function createArena(){
    // arena floor (inside the stadium)
    const floorGeo = new THREE.PlaneGeometry(AW, AL, 1, 1);
    const floorMat = new THREE.MeshLambertMaterial({color:0xA8E6CF});
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x=-Math.PI/2; floor.position.y=0.01; floor.receiveShadow=true;
    scene.add(floor);

    // ground plane extending beyond the stadium (grass)
    const groundGeo = new THREE.PlaneGeometry(800, 800, 1, 1);
    const groundMat = new THREE.MeshLambertMaterial({color:0x5a9e4b});
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI/2; ground.position.y = -0.05; ground.receiveShadow = true;
    scene.add(ground);

    // field markings
    const lm = new THREE.MeshBasicMaterial({color:0xffffff});
    const cl = new THREE.Mesh(new THREE.PlaneGeometry(.2,AL), lm);
    cl.rotation.x=-Math.PI/2; cl.position.y=.02; scene.add(cl);
    const cc = new THREE.Mesh(new THREE.RingGeometry(13.5,13.7,48), new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide}));
    cc.rotation.x=-Math.PI/2; cc.position.y=.02; scene.add(cc);

    const wm = new THREE.MeshLambertMaterial({color:0xFFB3BA, transparent:true, opacity:0.25, side:THREE.DoubleSide});
    const gm = new THREE.MeshLambertMaterial({color:0xFFEAA7, transparent:true, opacity:0.35, side:THREE.DoubleSide});
    const wt = .8; // wall thickness

    // side walls
    const swg = new THREE.BoxGeometry(wt, AH, AL+GD*2);
    const lw = new THREE.Mesh(swg, wm); lw.position.set(-AW/2-wt/2, AH/2, 0); lw.castShadow=true; scene.add(lw);
    const rw = new THREE.Mesh(swg, wm); rw.position.set(AW/2+wt/2, AH/2, 0); rw.castShadow=true; scene.add(rw);

    // ceiling
    const ceil = new THREE.Mesh(new THREE.BoxGeometry(AW+wt*2, wt, AL+GD*2), wm);
    ceil.position.set(0, AH+wt/2, 0); scene.add(ceil);

    // end walls helper
    function endWall(zSign){
        const z = zSign * (AL/2);
        // left section
        const lsw = AW/2 - GW/2;
        const lsg = new THREE.BoxGeometry(lsw, AH, wt);
        const ls = new THREE.Mesh(lsg, wm);
        ls.position.set(-AW/2+lsw/2, AH/2, z-zSign*wt/2); ls.castShadow=true; scene.add(ls);
        // right section
        const rs = new THREE.Mesh(lsg, wm);
        rs.position.set(AW/2-lsw/2, AH/2, z-zSign*wt/2); rs.castShadow=true; scene.add(rs);
        // top section above goal
        const tsg = new THREE.BoxGeometry(GW, AH-GH, wt);
        const ts = new THREE.Mesh(tsg, wm);
        ts.position.set(0, GH+(AH-GH)/2, z-zSign*wt/2); ts.castShadow=true; scene.add(ts);

        // goal box
        const gz = z + zSign * GD/2;
        // back
        const bg = new THREE.BoxGeometry(GW+wt*2, GH, wt);
        const bm = new THREE.Mesh(bg, gm);
        bm.position.set(0, GH/2, gz+zSign*GD/2); scene.add(bm);
        // sides
        const sg = new THREE.BoxGeometry(wt, GH, GD);
        const sl = new THREE.Mesh(sg, gm);
        sl.position.set(-GW/2-wt/2, GH/2, gz); scene.add(sl);
        const sr = new THREE.Mesh(sg, gm);
        sr.position.set(GW/2+wt/2, GH/2, gz); scene.add(sr);
        // top
        const tg = new THREE.BoxGeometry(GW+wt*2, wt, GD);
        const tp = new THREE.Mesh(tg, gm);
        tp.position.set(0, GH+wt/2, gz); scene.add(tp);
    }
    endWall(-1); // AI side
    endWall(1);  // player side
}

/* ===== GAME STATE ===== */
const player = { pos:new THREE.Vector3(0,CHY,30), vel:new THREE.Vector3(), rot:Math.PI, onGround:true, canFlip:false, isFlipping:false, flipTimer:0, flipType:'', boost:B_MAX, jumpHeld:false, flipHit:false, accelRamp:0 };
const ai     = { pos:new THREE.Vector3(0,CHY,-30), vel:new THREE.Vector3(), rot:0, onGround:true, canFlip:false, isFlipping:false, flipTimer:0, flipType:'', boost:B_MAX, jumpHeld:false, flipHit:false, accelRamp:0 };
const ball   = { pos:new THREE.Vector3(0,BR,0), vel:new THREE.Vector3(), angVel:new THREE.Vector3() };

let pScore=0, aScore=0, goalCD=0, lastTime=0;
const keys = {};

window.addEventListener('keydown', e=>{ keys[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
window.addEventListener('keyup', e=>{ keys[e.code]=false; });

/* ===== CREATE MESHES ===== */
createArena();

/* ===== SCENERY (trees + grandstands) ===== */
(function createScenery(){
    // --- TREES ---
    const trunkGeo = new THREE.BoxGeometry(1.2, 4, 1.2);
    const trunkMat = new THREE.MeshLambertMaterial({color:0x8B5E3C});
    const canopyGeo = new THREE.BoxGeometry(4, 3.5, 4);
    const canopyMat = new THREE.MeshLambertMaterial({color:0x2E7D32});
    const canopy2Geo = new THREE.BoxGeometry(3, 2.5, 3);

    // tree positions scattered around the arena
    const trees = [
        {x:-70, z:-80}, {x: 70, z:-80}, {x:-70, z: 80}, {x: 70, z: 80},
        {x:-90, z:-40}, {x: 90, z:-40}, {x:-90, z: 40}, {x: 90, z: 40},
        {x:-55, z:-110}, {x: 55, z:-110}, {x:-55, z:110}, {x: 55, z:110},
        {x:-110, z: 0}, {x: 110, z: 0},
        {x:-100, z:-70}, {x: 100, z:-70}, {x:-100, z: 70}, {x: 100, z: 70},
        {x:  0, z:-120}, {x:  0, z: 120},
        {x:-120, z:-30}, {x: 120, z: 30}, {x:-30, z: 100}, {x: 30, z:-100},
    ];
    trees.forEach(p => {
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.set(p.x, 2, p.z);
        trunk.castShadow = true;
        scene.add(trunk);
        const canopy = new THREE.Mesh(canopyGeo, canopyMat);
        canopy.position.set(p.x, 5.5, p.z);
        canopy.castShadow = true;
        scene.add(canopy);
        const top = new THREE.Mesh(canopy2Geo, canopyMat);
        top.position.set(p.x, 8, p.z);
        top.castShadow = true;
        scene.add(top);
    });

    // --- GRANDSTANDS (along both long sides) ---
    const standGeo = new THREE.BoxGeometry(AW * 0.8, 8, 6);
    const standMat = new THREE.MeshLambertMaterial({color:0x888888});
    // Left grandstand
    const standL = new THREE.Mesh(standGeo, standMat);
    standL.position.set(0, 4, -AL/2 - 12);
    standL.castShadow = true; standL.receiveShadow = true;
    scene.add(standL);
    // Right grandstand
    const standR = new THREE.Mesh(standGeo, standMat);
    standR.position.set(0, 4, AL/2 + 12);
    standR.castShadow = true; standR.receiveShadow = true;
    scene.add(standR);

    // Spectators — instanced colored cubes on the grandstand rows
    const specGeo = new THREE.BoxGeometry(1.2, 1.8, 1.2);
    const specColors = [0xe53935, 0x1E88E5, 0xFDD835, 0x43A047, 0xFF6F00, 0x8E24AA, 0xffffff];
    // Use one InstancedMesh per color for performance
    const rowCount = 3, colCount = 30;
    specColors.forEach((color, ci) => {
        const mat = new THREE.MeshLambertMaterial({color});
        const count = rowCount * colCount;
        const mesh = new THREE.InstancedMesh(specGeo, mat, count);
        const dummy = new THREE.Object3D();
        let idx = 0;
        for(let side of [-1, 1]){
            const baseZ = side * (AL/2 + 12);
            for(let row = 0; row < rowCount; row++){
                for(let col = 0; col < Math.floor(colCount / 2); col++){
                    if(idx >= count) break;
                    const x = (col - colCount/4) * 2.8 + (Math.random()-0.5)*0.4;
                    const y = 8.5 + row * 2.2 + (Math.random()-0.5)*0.3;
                    const z = baseZ + side * (1 + row * 1.8);
                    dummy.position.set(x, y, z);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(idx++, dummy.matrix);
                }
            }
        }
        mesh.count = idx;
        mesh.instanceMatrix.needsUpdate = true;
        scene.add(mesh);
    });
})();

const pCarMesh = makeVoxelMesh(buildCar({r:.45,g:.73,b:1},{r:.35,g:.6,b:.9}));
scene.add(pCarMesh);

const aCarMesh = makeVoxelMesh(buildCar({r:1,g:.42,b:.42},{r:.88,g:.33,b:.33}));
scene.add(aCarMesh);

const ballMesh = makeVoxelMesh(buildBall());
scene.add(ballMesh);

// shadows on ground
const shGeo = new THREE.CircleGeometry(1.8, 16);
const shMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:.18, depthWrite:false});
const pShadow = new THREE.Mesh(shGeo, shMat); pShadow.rotation.x=-Math.PI/2; scene.add(pShadow);
const aShadow = new THREE.Mesh(shGeo, shMat); aShadow.rotation.x=-Math.PI/2; scene.add(aShadow);
const bShadow = new THREE.Mesh(shGeo.clone(), shMat); bShadow.rotation.x=-Math.PI/2; scene.add(bShadow);

/* ===== PHYSICS HELPERS ===== */
function fwd(rot){ return new THREE.Vector3(Math.sin(rot),0,Math.cos(rot)); }

function updateCar(c, input, dt){
    const f = fwd(c.rot);
    const right = new THREE.Vector3(Math.cos(c.rot),0,-Math.sin(c.rot));

    // steering — proportional from joystick, full from keyboard
    const steer = (input.steerAnalog !== undefined) ? input.steerAnalog :
                  (input.left ? 1 : input.right ? -1 : 0);
    c.rot += steer * C_TURN * dt;

    // acceleration direction
    const accDir = new THREE.Vector3();
    if(input.forward)  accDir.add(f);
    if(input.backward) accDir.sub(f);

    // gradual acceleration ramp (0→1 over ACCEL_RAMP_T seconds)
    if(accDir.lengthSq() > 0){
        c.accelRamp = Math.min(1, c.accelRamp + dt / ACCEL_RAMP_T);
    } else {
        c.accelRamp = Math.max(0, c.accelRamp - dt / (ACCEL_RAMP_T * 0.5));
    }

    let accMag = C_ACC * c.accelRamp;
    // boost (also scaled by ramp)
    if(input.boost && c.boost > 0 && input.forward){
        accMag = B_ACC * c.accelRamp;
        c.boost = Math.max(0, c.boost - B_DRAIN);
    } else {
        c.boost = Math.min(B_MAX, c.boost + B_REGEN);
    }

    if(accDir.lengthSq()>0){
        accDir.normalize().multiplyScalar(accMag*dt);
        c.vel.add(accDir);
    }

    // clamp horizontal speed
    const hSpeed = Math.sqrt(c.vel.x*c.vel.x + c.vel.z*c.vel.z);
    if(hSpeed > C_MAX){ c.vel.x *= C_MAX/hSpeed; c.vel.z *= C_MAX/hSpeed; }

    // gravity
    c.vel.y += GRAV * dt;

    // friction
    const fric = c.onGround ? C_GFRI : C_AFRI;
    c.vel.x *= fric; c.vel.z *= fric;

    // jump / flip  —  variable height via release-to-cut
    if(input.jump){
        if(c.onGround && !c.jumpHeld){
            c.vel.y = J_VEL;
            c.onGround = false;
            c.canFlip = true;
            c.jumpHeld = true;
        } else if(c.canFlip && !c.jumpHeld){
            c.canFlip = false;
            c.isFlipping = true;
            c.flipTimer = F_DUR;
            c.flipHit = true;

            const ff = fwd(c.rot);
            const rr = new THREE.Vector3(Math.cos(c.rot),0,-Math.sin(c.rot));
            if(input.forward){       c.flipType='front'; c.vel.addScaledVector(ff, F_VEL); c.vel.y+=F_VEL*.35; }
            else if(input.backward){ c.flipType='back';  c.vel.addScaledVector(ff,-F_VEL); c.vel.y+=F_VEL*.35; }
            else if(input.left){     c.flipType='left';  c.vel.addScaledVector(rr, F_VEL); c.vel.y+=F_VEL*.35; }
            else if(input.right){    c.flipType='right'; c.vel.addScaledVector(rr,-F_VEL); c.vel.y+=F_VEL*.35; }
            else {                   c.flipType='up';    c.vel.y += J_VEL*.8; }
            c.jumpHeld = true;
        }
    } else {
        // Variable jump: releasing early cuts upward velocity for a short hop
        if(c.jumpHeld && !c.onGround && c.vel.y > 0 && c.canFlip){
            c.vel.y *= J_CUT;
        }
        c.jumpHeld = false;
    }

    // flip timer
    if(c.flipTimer>0){ c.flipTimer-=dt; if(c.flipTimer<=0){ c.isFlipping=false; c.flipHit=false; } }

    // integrate
    c.pos.addScaledVector(c.vel, dt);

    // ground — only reset accelRamp on actual landing (air→ground transition)
    if(c.pos.y - CHY < 0){
        const wasAir = !c.onGround;
        c.pos.y=CHY; c.vel.y=0; c.onGround=true; c.canFlip=false; c.isFlipping=false; c.flipHit=false;
        if(wasAir) c.accelRamp=0;
    }

    // walls (car uses max half-extent for simplicity)
    const cr = Math.max(CHX, CHZ);
    if(c.pos.x-cr < -AW/2){ c.pos.x=-AW/2+cr; c.vel.x*=-.3; }
    if(c.pos.x+cr >  AW/2){ c.pos.x= AW/2-cr; c.vel.x*=-.3; }
    if(c.pos.y+CHY > AH)  { c.pos.y= AH-CHY;  c.vel.y*=-.3; }
    if(c.pos.z-cr < -AL/2){ c.pos.z=-AL/2+cr; c.vel.z*=-.3; }
    if(c.pos.z+cr >  AL/2){ c.pos.z= AL/2-cr; c.vel.z*=-.3; }
}

function updateBallPhysics(dt){
    ball.vel.y += GRAV * dt;
    ball.vel.x *= BA_FRI; ball.vel.y *= BA_FRI; ball.vel.z *= BA_FRI;

    ball.pos.addScaledVector(ball.vel, dt);

    const r = BR;
    // ground
    if(ball.pos.y - r < 0){
        ball.pos.y = r;
        ball.vel.y = -ball.vel.y * B_REST;
        ball.vel.x *= BG_FRI; ball.vel.z *= BG_FRI;
    }
    // ceiling
    if(ball.pos.y + r > AH){ ball.pos.y = AH-r; ball.vel.y = -ball.vel.y * W_REST; }
    // side walls
    if(ball.pos.x - r < -AW/2){ ball.pos.x = -AW/2+r; ball.vel.x = -ball.vel.x * W_REST; }
    if(ball.pos.x + r >  AW/2){ ball.pos.x =  AW/2-r; ball.vel.x = -ball.vel.x * W_REST; }

    // end walls with goal openings
    endWallBall(-1, dt);
    endWallBall( 1, dt);

    // angular velocity for visual rolling
    ball.angVel.set(-ball.vel.z / r, 0, ball.vel.x / r);
}

function endWallBall(zSign){
    const r = BR;
    const zLine = zSign * AL/2;
    const inGoalX = Math.abs(ball.pos.x) < GW/2;
    const inGoalY = ball.pos.y < GH;
    const pastLine = zSign < 0 ? ball.pos.z - r < zLine : ball.pos.z + r > zLine;

    if(!pastLine) return;

    if(inGoalX && inGoalY){
        // ball is in goal opening area — bounce inside goal box
        const goalZ = zSign < 0 ? -AL/2 - GD : AL/2 + GD;
        const goalCenterZ = zSign < 0 ? -AL/2 - GD/2 : AL/2 + GD/2;

        // back wall
        if(zSign<0 && ball.pos.z - r < goalZ){ ball.pos.z = goalZ + r; ball.vel.z = -ball.vel.z * W_REST; }
        if(zSign>0 && ball.pos.z + r > goalZ){ ball.pos.z = goalZ - r; ball.vel.z = -ball.vel.z * W_REST; }
        // goal side walls
        if(ball.pos.x - r < -GW/2){ ball.pos.x = -GW/2+r; ball.vel.x = -ball.vel.x * W_REST; }
        if(ball.pos.x + r >  GW/2){ ball.pos.x =  GW/2-r; ball.vel.x = -ball.vel.x * W_REST; }
        // goal ceiling
        if(ball.pos.y + r > GH){ ball.pos.y = GH-r; ball.vel.y = -ball.vel.y * W_REST; }
    } else {
        // bounce off end wall
        if(zSign<0){ ball.pos.z = zLine+r; ball.vel.z = -ball.vel.z * W_REST; }
        else       { ball.pos.z = zLine-r; ball.vel.z = -ball.vel.z * W_REST; }
    }
}

/* ===== CAR-BALL COLLISION ===== */
function carBallCollision(car, carMesh){
    // transform ball into car local space
    const local = ball.pos.clone().sub(car.pos);
    const cosR = Math.cos(-car.rot), sinR = Math.sin(-car.rot);
    const lx = local.x*cosR - local.z*sinR;
    const lz = local.x*sinR + local.z*cosR;
    const ly = local.y;

    // closest point on AABB
    const cx = Math.max(-CHX, Math.min(CHX, lx));
    const cy = Math.max(-CHY, Math.min(CHY, ly));
    const cz = Math.max(-CHZ, Math.min(CHZ, lz));

    const dx=lx-cx, dy=ly-cy, dz=lz-cz;
    const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);

    if(dist < BR && dist > 0.001){
        // normal in local space
        let nx=dx/dist, ny=dy/dist, nz=dz/dist;
        // transform normal to world space
        const cosR2=Math.cos(car.rot), sinR2=Math.sin(car.rot);
        const wnx = nx*cosR2 - nz*sinR2;
        const wnz = nx*sinR2 + nz*cosR2;
        const wny = ny;
        const normal = new THREE.Vector3(wnx, wny, wnz);

        // separate
        const overlap = BR - dist;
        ball.pos.addScaledVector(normal, overlap * 1.05);

        // impulse
        const relVel = car.vel.clone().sub(ball.vel);
        const velAlong = relVel.dot(normal);
        if(velAlong <= 0) return;

        const e = 0.85;
        const massRatio = C_MASS / (C_MASS + BL_MASS);
        let impulse = velAlong * (1+e) * massRatio;

        if(car.flipHit) impulse *= F_MULT;

        ball.vel.addScaledVector(normal, impulse);
        // small reaction on car
        car.vel.addScaledVector(normal, -impulse * BL_MASS / C_MASS);
    }
}

/* ===== CAR-CAR COLLISION ===== */
function carCarCollision(){
    const dist = player.pos.distanceTo(ai.pos);
    const minD = 3.6;
    if(dist < minD && dist > 0.01){
        const n = ai.pos.clone().sub(player.pos).normalize();
        const overlap = minD - dist;
        player.pos.addScaledVector(n, -overlap/2);
        ai.pos.addScaledVector(n, overlap/2);
        const relVel = player.vel.clone().sub(ai.vel);
        const va = relVel.dot(n);
        if(va > 0){
            player.vel.addScaledVector(n, -va*.5);
            ai.vel.addScaledVector(n, va*.5);
        }
    }
}

/* ===== GOAL DETECTION ===== */
function checkGoals(){
    if(goalCD > 0) return;
    // AI's goal at z = -AL/2
    if(ball.pos.z < -AL/2 - 1 && Math.abs(ball.pos.x) < GW/2 && ball.pos.y < GH){
        pScore++; goalCD = GOAL_CD; showGoal();
    }
    // player's goal at z = +AL/2
    if(ball.pos.z > AL/2 + 1 && Math.abs(ball.pos.x) < GW/2 && ball.pos.y < GH){
        aScore++; goalCD = GOAL_CD; showGoal();
    }
}

function showGoal(){
    document.getElementById('goal-overlay').style.display='block';
    resetPositions();
}

function resetPositions(){
    ball.pos.set(0,BR,0); ball.vel.set(0,0,0);
    player.pos.set(0,CHY,30); player.vel.set(0,0,0); player.rot=Math.PI;
    player.onGround=true; player.canFlip=false; player.isFlipping=false; player.flipHit=false; player.accelRamp=0;
    ai.pos.set(0,CHY,-30); ai.vel.set(0,0,0); ai.rot=0;
    ai.onGround=true; ai.canFlip=false; ai.isFlipping=false; ai.flipHit=false; ai.accelRamp=0;
}

/* ===== AI ===== */
function getAIInput(){
    const inp = {forward:false, backward:false, left:false, right:false, jump:false, boost:false};

    const toBall = ball.pos.clone().sub(ai.pos); toBall.y=0;
    const distBall = toBall.length();

    // target: position behind ball relative to player's goal (+Z)
    const goalZ = AL/2;
    const ballToGoal = new THREE.Vector3(0,0,goalZ).sub(ball.pos); ballToGoal.y=0;
    const bLen = ballToGoal.length();
    const desired = ball.pos.clone().add(ballToGoal.normalize().multiplyScalar(-4)); desired.y=0;

    const toDesired = desired.clone().sub(ai.pos); toDesired.y=0;
    const angleToDesired = Math.atan2(toDesired.x, toDesired.z);
    let angleDiff = angleToDesired - ai.rot;
    // normalize
    while(angleDiff > Math.PI) angleDiff -= 2*Math.PI;
    while(angleDiff < -Math.PI) angleDiff += 2*Math.PI;

    // steer
    if(angleDiff > 0.08) inp.left = true;
    else if(angleDiff < -0.08) inp.right = true;

    // drive
    if(Math.abs(angleDiff) < Math.PI/2.5) inp.forward = true;
    else if(Math.abs(angleDiff) > Math.PI*0.6) inp.backward = true;
    else inp.forward = true;

    // boost when lined up and close
    if(distBall < 22 && Math.abs(angleDiff) < 0.35 && ai.boost > 25) inp.boost = true;

    // jump when near ball and ball is above
    if(distBall < 6 && ai.onGround && (ball.pos.y > 2 || Math.random()<0.008)){
        inp.jump = true;
    }
    // flip toward ball when in air near ball
    if(!ai.onGround && ai.canFlip && distBall < 8){
        inp.jump = true;
        // set direction
        const toB = ball.pos.clone().sub(ai.pos); toB.y=0;
        const aToB = Math.atan2(toB.x, toB.z) - ai.rot;
        if(Math.abs(aToB) < Math.PI/4) inp.forward = true;
        else if(aToB > 0) inp.left = true;
        else inp.right = true;
    }

    return inp;
}

/* ===== MESH UPDATES ===== */
function updateCarMesh(car, mesh){
    mesh.position.copy(car.pos);
    if(car.isFlipping && car.flipTimer > 0){
        const progress = 1 - car.flipTimer / F_DUR;
        const angle = progress * Math.PI * 2;
        const e = new THREE.Euler(0, car.rot, 0, 'YXZ');
        mesh.setRotationFromEuler(e);
        if(car.flipType==='front') mesh.rotateX(angle);
        else if(car.flipType==='back') mesh.rotateX(-angle);
        else if(car.flipType==='left') mesh.rotateZ(angle);
        else if(car.flipType==='right') mesh.rotateZ(-angle);
    } else {
        mesh.rotation.set(0, car.rot, 0);
    }
}

function updateBallMesh(){
    ballMesh.position.copy(ball.pos);
    // rolling rotation
    const speed = Math.sqrt(ball.vel.x*ball.vel.x + ball.vel.z*ball.vel.z);
    if(speed > 0.1){
        const axis = new THREE.Vector3(-ball.vel.z, 0, ball.vel.x).normalize();
        const angle = speed * (1/60) / BR;
        ballMesh.rotateOnWorldAxis(axis, angle);
    }
}

/* ===== CAMERA ===== */
const camOffset = new THREE.Vector3(0, 12, -24);
const camLookOffset = new THREE.Vector3(0, 2, 15);
const camPos = new THREE.Vector3();
const camTarget = new THREE.Vector3();

function updateCamera(dt){
    const off = camOffset.clone().applyAxisAngle(new THREE.Vector3(0,1,0), player.rot);
    const desired = player.pos.clone().add(off);
    camPos.lerp(desired, 1 - Math.pow(0.01, dt));

    const lookOff = camLookOffset.clone().applyAxisAngle(new THREE.Vector3(0,1,0), player.rot);
    const desiredTarget = player.pos.clone().add(lookOff);
    // slight bias toward ball
    desiredTarget.lerp(ball.pos, 0.12);
    camTarget.lerp(desiredTarget, 1 - Math.pow(0.005, dt));

    camera.position.copy(camPos);
    camera.lookAt(camTarget);
}

/* ===== PLAYER INPUT ===== */
const touchState = { forward:false, backward:false, left:false, right:false, jump:false, boost:false, joyX:0, joyY:0 };
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

if(isTouchDevice){
    document.getElementById('touch-controls').classList.add('active');
    document.getElementById('hint').style.display = 'none';
    document.getElementById('boost-wrap').style.bottom = '230px';

    // --- Action buttons (jump / boost) ---
    const actionBtnMap = {
        'btn-jump':  'jump',
        'btn-boost': 'boost'
    };
    for(const [id, key] of Object.entries(actionBtnMap)){
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e=>{ e.preventDefault(); touchState[key]=true; el.classList.add('pressed'); }, {passive:false});
        el.addEventListener('touchend',   e=>{ e.preventDefault(); touchState[key]=false; el.classList.remove('pressed'); }, {passive:false});
        el.addEventListener('touchcancel',e=>{ touchState[key]=false; el.classList.remove('pressed'); });
    }

    // --- Floating virtual joystick ---
    const joystickZone = document.getElementById('joystick-zone');
    const joystickBase = document.getElementById('joystick-base');
    const joystickKnob = document.getElementById('joystick-knob');
    let joyTouchId = null;
    let joyCenter  = { x: 0, y: 0 };
    const JOY_MAX_R  = 55;   // max drag radius (px)
    const JOY_DEAD   = 10;   // dead zone (px)

    joystickZone.addEventListener('touchstart', e => {
        e.preventDefault();
        if(joyTouchId !== null) return;               // already tracking a finger
        const t = e.changedTouches[0];
        joyTouchId = t.identifier;
        joyCenter  = { x: t.clientX, y: t.clientY };
        // show base circle at touch point
        joystickBase.style.display = 'block';
        joystickBase.style.left = (joyCenter.x - 70) + 'px';
        joystickBase.style.top  = (joyCenter.y - 70) + 'px';
        joystickKnob.style.left = '50%';
        joystickKnob.style.top  = '50%';
    }, { passive: false });

    document.addEventListener('touchmove', e => {
        if(joyTouchId === null) return;
        let joyTouch = null;
        for(const t of e.changedTouches){
            if(t.identifier === joyTouchId){ joyTouch = t; break; }
        }
        if(!joyTouch) return;
        e.preventDefault();

        let dx = joyTouch.clientX - joyCenter.x;
        let dy = joyTouch.clientY - joyCenter.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > JOY_MAX_R){
            dx = dx / dist * JOY_MAX_R;
            dy = dy / dist * JOY_MAX_R;
        }
        joystickKnob.style.left = `calc(50% + ${dx}px)`;
        joystickKnob.style.top  = `calc(50% + ${dy}px)`;

        // map to directional input — both axes independently and simultaneously
        const normX = dx / JOY_MAX_R;
        const normY = dy / JOY_MAX_R;
        touchState.joyX = normX;
        touchState.joyY = normY;
        touchState.left     = normX < -0.15;
        touchState.right    = normX >  0.15;
        touchState.forward  = normY < -0.15;   // drag up → forward
        touchState.backward = normY >  0.15;   // drag down → backward
    }, { passive: false });

    function resetJoystick(){
        joyTouchId = null;
        joystickBase.style.display = 'none';
        joystickKnob.style.left = '50%';
        joystickKnob.style.top  = '50%';
        touchState.forward  = false;
        touchState.backward = false;
        touchState.left     = false;
        touchState.right    = false;
        touchState.joyX = 0;
        touchState.joyY = 0;
    }
    document.addEventListener('touchend', e => {
        if(joyTouchId === null) return;
        for(const t of e.changedTouches){
            if(t.identifier === joyTouchId){ resetJoystick(); return; }
        }
    });
    document.addEventListener('touchcancel', e => {
        if(joyTouchId === null) return;
        for(const t of e.changedTouches){
            if(t.identifier === joyTouchId){ resetJoystick(); return; }
        }
    });
}

function getPlayerInput(){
    // Analog steering: joystick X gives proportional turn rate
    // Keyboard gives full -1 / 0 / +1
    let steerAnalog = 0;
    if(touchState.left || touchState.right) steerAnalog = -touchState.joyX;  // negate: right joy → positive → rot increases = right turn
    if(keys['KeyA'] || keys['ArrowLeft'])   steerAnalog = 1;
    if(keys['KeyD'] || keys['ArrowRight'])  steerAnalog = -1;
    return {
        forward:  keys['KeyW'] || keys['ArrowUp']    || touchState.forward,
        backward: keys['KeyS'] || keys['ArrowDown']   || touchState.backward,
        left:     keys['KeyA'] || keys['ArrowLeft']   || touchState.left,
        right:    keys['KeyD'] || keys['ArrowRight']  || touchState.right,
        steerAnalog,
        jump:     keys['Space']                       || touchState.jump,
        boost:    keys['ShiftLeft'] || keys['ShiftRight'] || touchState.boost
    };
}

/* ===== HUD ===== */
const boostFill = document.getElementById('boost-fill');
const pScoreEl  = document.getElementById('p-score');
const aScoreEl  = document.getElementById('a-score');
const goalOvEl  = document.getElementById('goal-overlay');

function updateHUD(){
    boostFill.style.width = (player.boost / B_MAX * 100) + '%';
    pScoreEl.textContent = pScore;
    aScoreEl.textContent = aScore;
}

/* ===== MAIN LOOP ===== */
function gameLoop(time){
    requestAnimationFrame(gameLoop);
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;
    if(dt <= 0) return;

    // goal cooldown
    if(goalCD > 0){
        goalCD -= dt;
        if(goalCD <= 0) goalOvEl.style.display='none';
    }

    // update cars
    updateCar(player, getPlayerInput(), dt);
    updateCar(ai, getAIInput(), dt);

    // update ball
    updateBallPhysics(dt);

    // collisions
    carBallCollision(player, pCarMesh);
    carBallCollision(ai, aCarMesh);
    carCarCollision();

    // goals
    checkGoals();

    // meshes
    updateCarMesh(player, pCarMesh);
    updateCarMesh(ai, aCarMesh);
    updateBallMesh();

    // shadows
    pShadow.position.set(player.pos.x, 0.02, player.pos.z);
    aShadow.position.set(ai.pos.x, 0.02, ai.pos.z);
    bShadow.position.set(ball.pos.x, 0.02, ball.pos.z);
    const ps = Math.max(0.3, 1 - (player.pos.y - CHY) / 15);
    pShadow.scale.setScalar(ps);
    const as = Math.max(0.3, 1 - (ai.pos.y - CHY) / 15);
    aShadow.scale.setScalar(as);
    const bs = Math.max(0.3, 1 - (ball.pos.y - BR) / 15);
    bShadow.scale.setScalar(bs * 1.2);

    // camera & HUD
    updateCamera(dt);
    updateHUD();

    renderer.render(scene, camera);
}

// init camera position
camPos.copy(player.pos.clone().add(camOffset.clone().applyAxisAngle(new THREE.Vector3(0,1,0), player.rot)));
camTarget.copy(player.pos);
camera.position.copy(camPos);
camera.lookAt(camTarget);

requestAnimationFrame(gameLoop);
</script>
